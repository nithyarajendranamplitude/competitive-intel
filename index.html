<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Amplitude Competitive Intel</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:#0a0e1a;font-family:'DM Sans','Helvetica Neue',sans-serif;color:#e2e8f0}
input::placeholder,textarea::placeholder{color:#475569}
::-webkit-scrollbar{width:6px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(99,102,241,0.2);border-radius:3px}
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes shimmer{0%{background-position:-200% 0}100%{background-position:200% 0}}
@keyframes float{0%,100%{transform:translateY(0)}50%{transform:translateY(-5px)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}
.header{padding:16px 24px;border-bottom:1px solid rgba(148,163,184,0.08);display:flex;align-items:center;gap:14;background:rgba(10,14,26,0.9);backdrop-filter:blur(20px);position:sticky;top:0;z-index:10}
.logo{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;box-shadow:0 0 20px rgba(99,102,241,0.3);cursor:pointer}
.header-title{font-size:15px;font-weight:700;color:#f1f5f9}
.header-sub{font-size:11px;color:#64748b;font-weight:500}
.content{max-width:720px;margin:0 auto;padding:32px 24px 80px}
.step-title{font-size:24px;font-weight:700;margin-bottom:8px;background:linear-gradient(135deg,#c7d2fe,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.step-desc{font-size:14px;color:#64748b;margin-bottom:28px;line-height:1.6}
.progress-bar{padding:20px 24px 0;max-width:720px;margin:0 auto}
.progress-track{display:flex;gap:8px}
.progress-seg{flex:1;height:3px;border-radius:2px;transition:all 0.3s ease}
.progress-seg.active{background:linear-gradient(90deg,#6366f1,#a855f7)}
.progress-seg.inactive{background:rgba(148,163,184,0.1)}
.progress-labels{display:flex;justify-content:space-between;margin-top:8px}
.progress-label{font-size:10px;font-weight:600;letter-spacing:0.05em;text-transform:uppercase}
.product-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.product-card{background:rgba(255,255,255,0.02);border:1px solid rgba(148,163,184,0.1);border-radius:14px;padding:16px 18px;text-align:left;cursor:pointer;transition:all 0.2s ease;font-family:inherit;width:100%;color:#e2e8f0}
.product-card:hover{border-color:rgba(148,163,184,0.25)}
.product-card.selected{background:linear-gradient(135deg,rgba(99,102,241,0.15),rgba(139,92,246,0.1));border:1.5px solid rgba(99,102,241,0.5)}
.product-name{font-size:14px;font-weight:600;color:#e2e8f0;margin-bottom:4px}
.product-card.selected .product-name{color:#c7d2fe}
.product-desc{font-size:12px;color:#64748b;line-height:1.4}
.chip{padding:8px 16px;border-radius:100px;background:rgba(255,255,255,0.03);border:1px solid rgba(148,163,184,0.1);color:#94a3b8;font-size:13px;cursor:pointer;transition:all 0.2s;font-family:inherit}
.chip:hover{border-color:rgba(148,163,184,0.25)}
.chip.selected{background:rgba(99,102,241,0.15);border:1.5px solid rgba(99,102,241,0.5);color:#c7d2fe;font-weight:600}
.btn-primary{padding:12px 28px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;color:#fff;font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-primary:disabled{background:rgba(99,102,241,0.15);color:#475569;cursor:not-allowed}
.btn-back{padding:12px 24px;border-radius:12px;background:transparent;border:1px solid rgba(148,163,184,0.15);color:#94a3b8;font-size:14px;font-weight:500;cursor:pointer;font-family:inherit}
.btn-generate{padding:14px 32px;border-radius:12px;background:linear-gradient(135deg,#6366f1,#7c3aed);border:none;color:#fff;font-size:15px;font-weight:700;cursor:pointer;font-family:inherit;box-shadow:0 0 24px rgba(99,102,241,0.3)}
.btn-new{padding:8px 16px;border-radius:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;font-size:12px;font-weight:600;cursor:pointer;font-family:inherit}
.comparison-box{padding:16px;border-radius:12px;margin-bottom:20px;background:rgba(99,102,241,0.05);border:1px solid rgba(99,102,241,0.12)}
.comparison-label{font-size:11px;color:#818cf8;font-weight:600;letter-spacing:0.05em;margin-bottom:8px}
.comparison-product{font-size:14px;color:#e2e8f0;font-weight:600;margin-bottom:4px}
.comparison-vs{font-size:12px;color:#94a3b8}
.context-input{width:100%;min-height:100px;padding:16px;border-radius:12px;background:rgba(255,255,255,0.03);border:1px solid rgba(148,163,184,0.12);color:#e2e8f0;font-size:13px;font-family:inherit;line-height:1.6;outline:none;resize:vertical}
.custom-input{flex:1;padding:10px 16px;border-radius:10px;background:rgba(255,255,255,0.03);border:1px solid rgba(148,163,184,0.12);color:#e2e8f0;font-size:13px;font-family:inherit;outline:none}
.btn-add{padding:10px 16px;border-radius:10px;background:rgba(99,102,241,0.1);border:1px solid rgba(99,102,241,0.25);color:#a5b4fc;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit}
.loading-icon{width:56px;height:56px;border-radius:16px;background:linear-gradient(135deg,#6366f1,#a855f7);display:flex;align-items:center;justify-content:center;font-size:24px;margin:0 auto 20px;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 40px rgba(99,102,241,0.3)}
.loading-text{font-size:16px;font-weight:600;background:linear-gradient(90deg,#64748b,#a5b4fc,#64748b);background-size:200% 100%;animation:shimmer 2.5s linear infinite;-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:8px}
.error-box{padding:20px;border-radius:14px;background:rgba(239,68,68,0.08);border:1px solid rgba(239,68,68,0.2);color:#fca5a5;font-size:14px;margin-top:20px;text-align:center}
.legend{display:flex;gap:20px;margin-bottom:20px;padding:10px 16px;border-radius:10px;background:rgba(255,255,255,0.02);border:1px solid rgba(148,163,184,0.06);flex-wrap:wrap}
.legend-item{display:flex;align-items:center;gap:6px}
.legend-badge{width:20px;height:20px;border-radius:5px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.legend-label{font-size:11px;color:#64748b;font-weight:500;text-transform:capitalize}
.cat-title{font-size:11px;font-weight:700;color:#818cf8;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px;padding-left:4px}
.grid-wrap{background:rgba(255,255,255,0.02);border-radius:14px;border:1px solid rgba(148,163,184,0.08);overflow-x:auto;margin-bottom:28px}
.grid-header{display:grid;gap:0;padding:10px 16px;border-bottom:1px solid rgba(148,163,184,0.08);background:rgba(255,255,255,0.02)}
.grid-header-feature{font-size:10px;color:#475569;font-weight:600;letter-spacing:0.05em}
.grid-header-amp{font-size:10px;font-weight:700;letter-spacing:0.05em;text-align:center;background:linear-gradient(135deg,#818cf8,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.grid-header-comp{font-size:10px;color:#64748b;font-weight:600;letter-spacing:0.05em;text-align:center}
.grid-row{display:grid;gap:0;padding:12px 16px;align-items:start;transition:background 0.15s}
.grid-row:hover{background:rgba(99,102,241,0.03)}
.grid-feature{font-size:13px;color:#cbd5e1;font-weight:500;padding-top:4px;padding-right:12px}
.badge{width:32px;height:32px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:700;margin:0 auto}
.badge-note{font-size:9.5px;color:#94a3b8;text-align:center;max-width:100px;line-height:1.3;margin:3px auto 0}
.badge-full{background:rgba(34,197,94,0.15);border:1px solid rgba(34,197,94,0.25);color:#4ade80}
.badge-partial{background:rgba(250,204,21,0.12);border:1px solid rgba(250,204,21,0.2);color:#fbbf24}
.badge-none{background:rgba(239,68,68,0.12);border:1px solid rgba(239,68,68,0.2);color:#f87171}
.badge-unknown{background:rgba(148,163,184,0.1);border:1px solid rgba(148,163,184,0.15);color:#94a3b8}
.takeaways{padding:24px;border-radius:16px;background:rgba(255,255,255,0.02);border:1px solid rgba(148,163,184,0.08);margin-bottom:20px}
.takeaways-title{font-size:11px;font-weight:700;color:#818cf8;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:12px}
.takeaways-body{font-size:14px;color:#cbd5e1;line-height:1.75;white-space:pre-wrap}
.watchout{padding:20px;border-radius:14px;background:rgba(250,204,21,0.05);border:1px solid rgba(250,204,21,0.15)}
.watchout-title{font-size:11px;font-weight:700;color:#fbbf24;letter-spacing:0.08em;text-transform:uppercase;margin-bottom:8px}
.watchout-body{font-size:13px;color:#fde68a;line-height:1.6}
.result-title{font-size:22px;font-weight:700;margin-bottom:6px;background:linear-gradient(135deg,#c7d2fe,#a78bfa);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.result-sub{font-size:12px;color:#475569;margin-bottom:24px}
.animate-in{animation:fadeUp 0.4s ease-out}
.float{animation:float 3s ease-in-out infinite}
.api-key-bar{padding:8px 24px;background:rgba(250,204,21,0.05);border-bottom:1px solid rgba(250,204,21,0.12);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.api-key-bar label{font-size:11px;color:#fbbf24;font-weight:600;letter-spacing:0.03em;white-space:nowrap}
.api-key-bar input{flex:1;min-width:200px;padding:6px 12px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(250,204,21,0.2);color:#fde68a;font-size:12px;font-family:monospace;outline:none}
.api-key-bar input:focus{border-color:rgba(250,204,21,0.5)}
.api-key-bar .status{font-size:11px;color:#64748b}
.api-key-bar .status.connected{color:#4ade80}
</style>
</head>
<body>

<div class="header">
  <div class="logo" onclick="resetApp()">⚡</div>
  <div style="flex:1">
    <div class="header-title">Amplitude Competitive Intel</div>
    <div class="header-sub">Real-time competitor analysis powered by AI + web search</div>
  </div>
  <button class="btn-new" id="newBtn" style="display:none" onclick="resetApp()">New comparison</button>
</div>

<div class="api-key-bar">
  <label>🔑 API Key:</label>
  <input type="password" id="apiKeyInput" placeholder="Paste your Anthropic API key (sk-ant-...)" oninput="saveApiKey()">
  <span class="status" id="apiKeyStatus">Not connected</span>
</div>

<div class="progress-bar" id="progressBar">
  <div class="progress-track">
    <div class="progress-seg active" id="prog1"></div>
    <div class="progress-seg inactive" id="prog2"></div>
    <div class="progress-seg inactive" id="prog3"></div>
  </div>
  <div class="progress-labels">
    <span class="progress-label" id="progLabel1" style="color:#818cf8">Product</span>
    <span class="progress-label" id="progLabel2" style="color:#334155">Competitors</span>
    <span class="progress-label" id="progLabel3" style="color:#334155">Context</span>
  </div>
</div>

<div class="content" id="content"></div>

<script>
const PRODUCTS = {
  "Web Experiment": {
    description: "Visual A/B testing, no-code experiments",
    competitors: ["Optimizely", "VWO", "AB Tasty", "Kameleoon", "Adobe Target", "Dynamic Yield", "Flint", "Coframe"]
  },
  "Feature Experiment": {
    description: "Feature flags, server-side experiments",
    competitors: ["LaunchDarkly", "Optimizely Feature Experimentation", "Split.io", "Statsig", "Eppo", "DevCycle", "Flagship.io"]
  },
  "Session Replay": {
    description: "Session recordings, heatmaps, rage clicks",
    competitors: ["FullStory", "Hotjar", "LogRocket", "Heap", "Quantum Metric", "Contentsquare", "Smartlook"]
  },
  "Guides & Surveys": {
    description: "In-app guides, tooltips, surveys",
    competitors: ["Pendo", "WalkMe", "Appcues", "Userpilot", "Chameleon", "Whatfix", "UserGuiding"]
  },
  "Analytics": {
    description: "Product analytics, charts, cohorts",
    competitors: ["Mixpanel", "Heap", "PostHog", "Google Analytics", "Adobe Analytics", "Pendo", "Countly"]
  },
  "CDP / Audiences": {
    description: "Customer data platform, audience syncs",
    competitors: ["Segment", "mParticle", "Rudderstack", "Tealium", "Lytics", "Bloomreach", "ActionIQ"]
  },
  "Data Management": {
    description: "Data governance, schema management",
    competitors: ["Segment Protocols", "mParticle", "Avo", "Iteratively", "Heap"]
  }
};

const SYSTEM_PROMPT = 'You are an internal competitive intelligence assistant for Amplitude employees. When given an Amplitude product, competitors, and optional context, you MUST respond with ONLY valid JSON (no markdown, no backticks, no preamble). The JSON must follow this exact structure: {"features":[{"category":"Category Name","items":[{"feature":"Feature name","amplitude":"full","amplitude_note":"Brief note","competitors":{"Competitor Name":{"status":"full","note":"Brief note"}}}]}],"summary":"A 2-3 paragraph plain-language summary of the key differences, honest about gaps, and noting which competitor differences actually matter in practice vs. checkbox items. Be specific. No corporate buzzwords.","watch_out":"1-2 sentences on things a salesperson should be careful about."} Rules: Be honest about gaps. full = strong support, partial = exists but limited, none = does not have it, unknown = not sure. Include 8-15 features across 2-4 categories. Keep notes concise under 15 words each. Ground analysis in real current product capabilities. If context is provided weight features toward what is relevant. The amplitude and status fields MUST be one of: full, partial, none, unknown.';

const BADGE_MAP = {
  full: {label:"\u2713", cls:"badge-full"},
  partial: {label:"\u25D0", cls:"badge-partial"},
  none: {label:"\u2717", cls:"badge-none"},
  unknown: {label:"?", cls:"badge-unknown"}
};

const LOADING_PHRASES = [
  "Searching competitor websites...", "Reading pricing pages...",
  "Comparing feature lists...", "Checking the latest releases...",
  "Building your comparison...", "Almost there..."
];

let state = { step:1, product:null, competitors:[], context:"", result:null };
let apiKey = "";

function saveApiKey() {
  apiKey = document.getElementById('apiKeyInput').value.trim();
  const status = document.getElementById('apiKeyStatus');
  if (apiKey.startsWith('sk-ant-')) {
    status.textContent = '\u2713 Key saved (browser only)';
    status.className = 'status connected';
  } else if (apiKey.length > 0) {
    status.textContent = 'Key should start with sk-ant-...';
    status.className = 'status';
  } else {
    status.textContent = 'Not connected';
    status.className = 'status';
  }
}

function updateProgress() {
  for (let i = 1; i <= 3; i++) {
    document.getElementById('prog' + i).className = 'progress-seg ' + (i <= state.step ? 'active' : 'inactive');
    document.getElementById('progLabel' + i).style.color = i <= state.step ? '#818cf8' : '#334155';
  }
}

function renderStep1() {
  document.getElementById('progressBar').style.display = '';
  document.getElementById('newBtn').style.display = 'none';
  updateProgress();
  let h = '<div class="animate-in"><div style="margin-bottom:8px;font-size:32px" class="float">\uD83C\uDFAF</div>';
  h += '<h2 class="step-title">Which product are you comparing?</h2>';
  h += '<p class="step-desc">Pick the Amplitude product you want competitive intel on.</p>';
  h += '<div class="product-grid">';
  for (const [name, info] of Object.entries(PRODUCTS)) {
    const sel = state.product === name ? ' selected' : '';
    h += '<button class="product-card' + sel + '" onclick="selectProduct(\'' + name.replace(/'/g, "\\'") + '\')"><div class="product-name">' + name + '</div><div class="product-desc">' + info.description + '</div></button>';
  }
  h += '</div><div style="margin-top:24px;display:flex;justify-content:flex-end"><button class="btn-primary" ' + (!state.product ? 'disabled' : '') + ' onclick="goStep(2)">Next \u2192</button></div></div>';
  document.getElementById('content').innerHTML = h;
}

function selectProduct(name) { state.product = name; state.competitors = []; renderStep1(); }

function renderStep2() {
  updateProgress();
  const comps = PRODUCTS[state.product].competitors;
  let h = '<div class="animate-in"><div style="margin-bottom:8px;font-size:32px">\u2694\uFE0F</div>';
  h += '<h2 class="step-title">Who are you up against?</h2>';
  h += '<p style="font-size:14px;color:#64748b;margin-bottom:6px">Select up to 4 competitors to compare against ' + state.product + '.</p>';
  h += '<p style="font-size:12px;color:#475569;margin-bottom:24px">' + state.competitors.length + '/4 selected</p>';
  h += '<div style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:16px">';
  for (const c of comps) { h += '<button class="chip' + (state.competitors.includes(c) ? ' selected' : '') + '" onclick="toggleComp(\'' + c.replace(/'/g, "\\'") + '\')">' + c + '</button>'; }
  h += '</div><div style="display:flex;gap:8px;margin-bottom:24px"><input type="text" class="custom-input" id="customComp" placeholder="Add another competitor..." onkeydown="if(event.key===\'Enter\')addCustomComp()"><button class="btn-add" onclick="addCustomComp()">Add</button></div>';
  h += '<div style="display:flex;justify-content:space-between"><button class="btn-back" onclick="goStep(1)">\u2190 Back</button><button class="btn-primary" ' + (state.competitors.length === 0 ? 'disabled' : '') + ' onclick="goStep(3)">Next \u2192</button></div></div>';
  document.getElementById('content').innerHTML = h;
}

function toggleComp(name) { const i = state.competitors.indexOf(name); if (i > -1) state.competitors.splice(i, 1); else if (state.competitors.length < 4) state.competitors.push(name); renderStep2(); }
function addCustomComp() { const el = document.getElementById('customComp'); const n = el.value.trim(); if (n && !state.competitors.includes(n) && state.competitors.length < 4) { state.competitors.push(n); renderStep2(); } }

function renderStep3() {
  updateProgress();
  let h = '<div class="animate-in"><div style="margin-bottom:8px;font-size:32px">\uD83D\uDCAC</div>';
  h += '<h2 class="step-title">Any additional context?</h2>';
  h += '<p class="step-desc">Optional. Help the AI focus on what matters most to you right now.</p>';
  h += '<div class="comparison-box"><div class="comparison-label">YOUR COMPARISON</div><div class="comparison-product">' + state.product + '</div><div class="comparison-vs">vs. ' + state.competitors.join(', ') + '</div></div>';
  h += '<textarea class="context-input" id="contextInput" placeholder="e.g. I am on a call with a prospect who currently uses VWO and they are asking specifically about visual editor capabilities">' + state.context + '</textarea>';
  h += '<div style="display:flex;justify-content:space-between;margin-top:24px"><button class="btn-back" onclick="goStep(2)">\u2190 Back</button><button class="btn-generate" onclick="generate()">\u26A1 Generate Comparison</button></div></div>';
  document.getElementById('content').innerHTML = h;
}

function renderLoading() {
  document.getElementById('progressBar').style.display = 'none';
  let h = '<div class="animate-in" style="text-align:center;padding-top:60px"><div class="loading-icon">\u26A1</div><div class="loading-text" id="loadingText">' + LOADING_PHRASES[0] + '</div><div style="font-size:12px;color:#475569">Comparing ' + state.product + ' vs. ' + state.competitors.join(', ') + '</div></div>';
  document.getElementById('content').innerHTML = h;
  let i = 0;
  window._li = setInterval(function() { i = (i + 1) % LOADING_PHRASES.length; const el = document.getElementById('loadingText'); if (el) el.textContent = LOADING_PHRASES[i]; }, 3000);
}

function renderResults(data) {
  if (window._li) clearInterval(window._li);
  document.getElementById('progressBar').style.display = 'none';
  document.getElementById('newBtn').style.display = '';
  const comps = state.competitors;
  const cols = comps.length + 1;
  const gt = '200px repeat(' + cols + ', 1fr)';
  let h = '<div class="animate-in"><div class="result-title">' + state.product + ' vs. ' + comps.join(', ') + '</div><div class="result-sub">Generated just now with live web data</div>';
  h += '<div class="legend">';
  for (const [k, v] of Object.entries(BADGE_MAP)) h += '<div class="legend-item"><div class="legend-badge ' + v.cls + '">' + v.label + '</div><span class="legend-label">' + k + '</span></div>';
  h += '</div>';
  if (data.features) {
    for (const cat of data.features) {
      h += '<div class="cat-title">' + cat.category + '</div><div class="grid-wrap"><div class="grid-header" style="grid-template-columns:' + gt + '"><div class="grid-header-feature">FEATURE</div><div class="grid-header-amp">AMPLITUDE</div>';
      for (const c of comps) h += '<div class="grid-header-comp">' + c.toUpperCase() + '</div>';
      h += '</div>';
      for (let ii = 0; ii < cat.items.length; ii++) {
        const item = cat.items[ii];
        const brd = ii < cat.items.length - 1 ? 'border-bottom:1px solid rgba(148,163,184,0.05)' : '';
        h += '<div class="grid-row" style="grid-template-columns:' + gt + ';' + brd + '"><div class="grid-feature">' + item.feature + '</div>';
        const ab = BADGE_MAP[item.amplitude] || BADGE_MAP.unknown;
        h += '<div style="text-align:center"><div class="badge ' + ab.cls + '">' + ab.label + '</div>';
        if (item.amplitude_note) h += '<div class="badge-note">' + item.amplitude_note + '</div>';
        h += '</div>';
        for (const c of comps) {
          const comp = (item.competitors && item.competitors[c]) || {status:"unknown",note:""};
          const cb = BADGE_MAP[comp.status] || BADGE_MAP.unknown;
          h += '<div style="text-align:center"><div class="badge ' + cb.cls + '">' + cb.label + '</div>';
          if (comp.note) h += '<div class="badge-note">' + comp.note + '</div>';
          h += '</div>';
        }
        h += '</div>';
      }
      h += '</div>';
    }
  }
  if (data.summary) h += '<div class="takeaways"><div class="takeaways-title">KEY TAKEAWAYS</div><div class="takeaways-body">' + data.summary + '</div></div>';
  if (data.watch_out) h += '<div class="watchout"><div class="watchout-title">\u26A0\uFE0F WATCH OUT</div><div class="watchout-body">' + data.watch_out + '</div></div>';
  h += '</div>';
  document.getElementById('content').innerHTML = h;
}

async function generate() {
  const ctxEl = document.getElementById('contextInput');
  if (ctxEl) state.context = ctxEl.value;
  if (!apiKey || !apiKey.startsWith('sk-ant-')) { alert('Please paste your Anthropic API key in the bar at the top first.'); return; }
  renderLoading();
  const prompt = 'Compare Amplitude\'s ' + state.product + ' product against these competitors: ' + state.competitors.join(', ') + '.\n' + (state.context ? 'Additional context: ' + state.context + '\n' : '') + 'Return ONLY valid JSON, no markdown, no backticks, no explanation before or after the JSON.';

  let allText = '';
  let lastError = '';

  // Try up to 2 times handling the multi-turn tool use flow
  let messages = [{role:'user', content: prompt}];
  for (let turn = 0; turn < 3; turn++) {
    try {
      const resp = await fetch('https://amp-intel-proxy.nithya-rajendran.workers.dev', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          
          
          
        },
        body: JSON.stringify({
          model: 'claude-sonnet-4-20250514',
          max_tokens: 16000,
          system: SYSTEM_PROMPT,
          messages: messages,
          tools: [{type:'web_search_20250305', name:'web_search', max_uses: 3}]
        })
      });
      const data = await resp.json();
      console.log('API response turn ' + turn + ':', JSON.stringify(data).substring(0, 500));

      if (data.error) {
        lastError = data.error.message || JSON.stringify(data.error);
        break;
      }

      // Collect text blocks
      let turnText = '';
      let hasToolUse = false;
      let toolResults = [];

      if (data.content) {
        for (const block of data.content) {
          if (block.type === 'text') turnText += block.text;
          if (block.type === 'tool_use') {
            hasToolUse = true;
            toolResults.push({type: 'tool_result', tool_use_id: block.id, content: 'Search complete.'});
          }
        }
      }

      allText += turnText;

      // If end_turn or no tool use, we are done
      if (data.stop_reason === 'end_turn' || !hasToolUse) break;

      // Otherwise continue the conversation with tool results
      messages.push({role: 'assistant', content: data.content});
      messages.push({role: 'user', content: toolResults});

    } catch (err) {
      lastError = err.message;
      break;
    }
  }

  console.log('All text collected:', allText.substring(0, 300));

  // Try to parse JSON from collected text
  let parsed = null;
  try { parsed = JSON.parse(allText); } catch(e) {
    // Try to find JSON object in the text
    const matches = allText.match(/\{[\s\S]*\}/g);
    if (matches) {
      // Try each match, longest first
      const sorted = matches.sort(function(a, b) { return b.length - a.length; });
      for (const m of sorted) {
        try { parsed = JSON.parse(m); if (parsed.features) break; parsed = null; } catch(e2) {}
      }
    }
  }

  if (parsed && parsed.features) {
    state.result = parsed;
    state.step = 4;
    renderResults(parsed);
  } else {
    renderError(lastError || "Could not parse the comparison. The AI may not have returned valid JSON. Try again with fewer competitors or simpler context.");
  }
}

function renderError(msg) {
  if (window._li) clearInterval(window._li);
  document.getElementById('progressBar').style.display = '';
  document.getElementById('content').innerHTML = '<div class="error-box">' + msg + '<div style="margin-top:12px"><button style="padding:8px 20px;border-radius:8px;background:rgba(239,68,68,0.15);border:1px solid rgba(239,68,68,0.3);color:#fca5a5;font-size:13px;font-weight:600;cursor:pointer;font-family:inherit" onclick="generate()">Try again</button></div></div>';
}

function goStep(n) { state.step = n; if (n===1) renderStep1(); else if (n===2) renderStep2(); else if (n===3) renderStep3(); }
function resetApp() { state = {step:1, product:null, competitors:[], context:'', result:null}; goStep(1); }
renderStep1();
</script>
